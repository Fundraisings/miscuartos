<!-- CONTENEDOR PRINCIPAL DEL PRESUPUESTO -->
<div class="presupuesto-container">
    <h2>📊 Mi Presupuesto Real (Regla 70/20/10)</h2>
    
    <!-- Entrada de Ingresos -->
    <div class="form-group" style="margin-bottom: 20px;">
        <label for="ingresoTotal" style="font-weight: bold; display: block; margin-bottom: 5px;">💵 Ingreso Neto Mensual (Tus Cuartos):</label>
        <input type="number" id="ingresoTotal" placeholder="Ej. 40000" style="width: 100%; padding: 10px; border-radius: 6px; border: 1px solid #ccc; font-size: 16px;">
    </div>

    <!-- CATEGORÍA 1: Compromisos (70%) -->
    <h3>🔒 Compromisos Reales (Necesidades - 70% Ideal)</h3>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>🏠 Renta o Hipoteca:</label>
        <input type="number" class="input-gasto" data-category="compromisos" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>🛒 Supermercado y Colmado:</label>
        <input type="number" class="input-gasto" data-category="compromisos" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>⚡ Servicios (Luz, Agua, Internet, Gas):</label>
        <input type="number" class="input-gasto" data-category="compromisos" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>

    <!-- CATEGORÍA 2: El Coro (20%) -->
    <h3>🎉 El Coro y Estilo de Vida (Deseos - 20% Ideal)</h3>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>🍻 Salidas, Cenas y Entretenimiento:</label>
        <input type="number" class="input-gasto" data-category="coro" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>📺 Suscripciones (Netflix, Spotify, etc.):</label>
        <input type="number" class="input-gasto" data-category="coro" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>

    <!-- CATEGORÍA 3: Ahorros (10%) -->
    <h3>💰 Tus Clavos (Ahorro / Futuro - 10% Ideal)</h3>
    <div class="form-group" style="margin-bottom: 12px;">
        <label>🐷 Fondo de Emergencia / Inversión:</label>
        <input type="number" class="input-gasto" data-category="ahorro" placeholder="0" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ccc;">
    </div>

    <!-- MEDIDOR DE CUARTOS INTELIGENTE (BARRA DE PROGRESO) -->
    <div class="progress-container" style="margin: 25px 0 15px 0;">
        <label style="font-weight: bold; display: block; margin-bottom: 8px;">📊 Medidor de Cuartos Consumidos:</label>
        <div class="progress-bar-bg" style="background: #e0e0e0; border-radius: 8px; width: 100%; height: 22px; overflow: hidden; position: relative;">
            <div id="barraProgreso" style="background: #2ecc71; width: 0%; height: 100%; transition: width 0.3s ease, background-color 0.3s;"></div>
        </div>
    </div>

    <!-- CASILLA DE TIP FINANCIERO ADAPTADO (Debajo de la barra de progreso) -->
    <div id="tipDominicano" style="background: #fff3cd; border-left: 4px solid #ffc107; padding: 12px; border-radius: 6px; margin: 15px 0; font-size: 14px; color: #856404; display: none;">
        <!-- Se llena dinámicamente con JS -->
    </div>

    <!-- RESUMEN DE COMPORTAMIENTO -->
    <div class="resumen-valores" style="background: #f8f9fa; padding: 15px; border-radius: 8px; margin-top: 20px; border-left: 4px solid #3498db;">
        <p style="margin: 6px 0; display: flex; justify-content: space-between;"><strong>Ingresos:</strong> <span id="txtIngreso">RD$ 0.00</span></p>
        <p style="margin: 6px 0; display: flex; justify-content: space-between;"><strong>Total Gastado:</strong> <span id="txtGastado">RD$ 0.00</span></p>
        <p style="margin: 6px 0; display: flex; justify-content: space-between;"><strong>Disponible:</strong> <span id="txtDisponible" style="font-weight: bold;">RD$ 0.00</span></p>
    </div>

    <!-- BOTÓN DE WHATSAPP CON PROTECCIÓN DE PROPAGACIÓN -->
    <button id="btnEnviarWhatsapp" style="background: #25D366; color: white; border: none; padding: 14px; width: 100%; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 15px; display: block;">
        💬 Enviar Resumen por WhatsApp
    </button>
</div>
